---
schemaVersion: 1
module: "mastodon-rss-publisher"
target: "apps"
services:
  mastodon-rss-account-bootstrap:
    image: "ghcr.io/mastodon/mastodon:v4.5.4"
    containerName: "mastodon-rss-account-bootstrap"
    lifecycle: "daemon"
    updatePolicy: "registry"
    placement: "rootful"
    dependencies:
      mastodon-init: "completed"
      postgres-ssd-bootstrap: "completed"
      valkey: "healthy"
    environment:
      LOCAL_DOMAIN: "mastodon.${DOMAIN}"
      WEB_DOMAIN: "mastodon.${DOMAIN}"
      RAILS_ENV: "production"
      DB_HOST: "postgres-ssd"
      DB_PORT: 5432
      DB_NAME: "mastodon"
      DB_USER: "mastodon"
      REDIS_HOST: "valkey"
      REDIS_PORT: 6379
      REDIS_USER: "mastodon"
      REDIS_PASSWORD: "${VALKEY_MASTODON_PASSWORD}"
      SECRET_KEY_BASE: "${MASTODON_SECRET_KEY_BASE}"
      OTP_SECRET: "${MASTODON_OTP_SECRET}"
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: "${MASTODON_ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}"
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: "${MASTODON_ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}"
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: "${MASTODON_ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}"
      SSL_CERT_FILE: "/ca/caddy-ca.crt"
      MASTODON_RSS_FEED_DIR: "/configs/mastodon-rss/feeds.d"
      MASTODON_RSS_STATE_DIR: "/state"
      MASTODON_RSS_AVATAR_PATH: "/configs/mastodon-rss/assets/rss-news-avatar.png"
    networks:
    - "internet"
    - "postgres"
    - "valkey"
    - "mastodon-internal"
    volumes:
    - "caddy_ca:/ca:ro"
    - "./configs/mastodon-rss/feeds.d:/configs/mastodon-rss/feeds.d:ro"
    - "./configs/mastodon-rss/bootstrap-rss-accounts.sh:/opt/mastodon/bin/bootstrap-rss-accounts.sh:ro"
    - "./configs/mastodon-rss/assets/rss-news-avatar.png:/configs/mastodon-rss/assets/rss-news-avatar.png:ro"
    - "mastodon_public_system:/opt/mastodon/public/system"
    - "mastodon_rss_publisher_state:/state"
    command:
    - "bash"
    - "-c"
    - "while true; do bash /opt/mastodon/bin/bootstrap-rss-accounts.sh || true; sleep\
      \ 300; done"
    restart: "unless-stopped"
  mastodon-rss-publisher:
    image: "webservices/mastodon-rss-publisher:local-build"
    build:
      context: "."
      containerfile: "./stack.containers/mastodon-rss-publisher/Dockerfile"
    containerName: "mastodon-rss-publisher"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootful"
    dependencies:
      mastodon-rss-account-bootstrap: "started"
    environment:
      MASTODON_RSS_FEED_DIR: "/configs/mastodon-rss/feeds.d"
      MASTODON_RSS_STATE_DIR: "/state"
      MASTODON_RSS_API_URL: "https://mastodon.${DOMAIN}"
      MASTODON_RSS_POLL_SECONDS: "${MASTODON_RSS_POLL_SECONDS:-900}"
      MASTODON_RSS_BUCKET_DAYS: "${MASTODON_RSS_BUCKET_DAYS:-7}"
      MASTODON_RSS_MAX_POSTS_PER_FEED_POLL: "${MASTODON_RSS_MAX_POSTS_PER_FEED_POLL:-2}"
    networks:
    - "internet"
    - "mastodon-internal"
    volumes:
    - "./configs/mastodon-rss/feeds.d:/configs/mastodon-rss/feeds.d:ro"
    - "mastodon_rss_publisher_state:/state"
    health:
      test:
      - "CMD"
      - "python"
      - "/app/publisher.py"
      - "--healthcheck"
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "20s"
    restart: "unless-stopped"
networks: {}
volumes:
  mastodon_rss_publisher_state:
    hostPath: "${STACK_VOLUME_ROOT}/mastodon_rss_publisher_state"
    rootlessStrategy: "copy"
